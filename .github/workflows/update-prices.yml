name: Actualizare preturi ceasuri

on:
  schedule:
    # 03:00 UTC = 06:00 România (EEST, vara) / 05:00 (EET, iarna) — la fel ca la carti.gherasimmarius.com
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Instalare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalare dependinte
        run: npm ci

      - name: Instalare Chromium pentru Playwright
        run: npx playwright install --with-deps chromium

      - name: Actualizare preturi
        run: node update-prices.cjs

      - name: Commit si push modificari
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json
          if git diff --staged --quiet; then
            echo "Nu exista modificari de pret."
          else
            git commit -m "Actualizare automata preturi"
            git push
          fi
